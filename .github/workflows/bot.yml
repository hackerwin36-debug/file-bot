name: 🔥 OGGY FILE BOT - FINAL

on:
  schedule:
    - cron: "0 */6 * * *"
    - cron: "10 */6 * * *"
    - cron: "20 */6 * * *"
    - cron: "30 */6 * * *"
    - cron: "40 */6 * * *"
    - cron: "50 */6 * * *"
  workflow_dispatch:
  push:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: pip install pytelegrambotapi
      
      - name: Run OGGY BOT
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          python3 << 'EOF'
import telebot
import threading
import time
import os
import json

TOKEN = os.environ['TOKEN']
MASTER_OWNER = int(os.environ.get('OWNER_ID', 0))

bot = telebot.TeleBot(TOKEN)
SECRET = 'give_my_file'
DATA_FILE = 'file_data.json'
OWNERS_FILE = 'owners.json'

def load_owners():
    try:
        with open(OWNERS_FILE, 'r') as f:
            return json.load(f).get('owners', [MASTER_OWNER])
    except:
        return [MASTER_OWNER]

def save_owners(owners):
    with open(OWNERS_FILE, 'w') as f:
        json.dump({'owners': owners}, f)

def load_file():
    try:
        with open(DATA_FILE, 'r') as f:
            return json.load(f).get('file_id')
    except:
        return None

def save_file(file_id):
    with open(DATA_FILE, 'w') as f:
        json.dump({'file_id': file_id}, f)

OWNERS = load_owners()
FILE_ID = load_file()

def is_owner(user_id):
    return user_id in OWNERS

def delete_later(chat_id, msg_id, sec):
    time.sleep(sec)
    try:
        bot.delete_message(chat_id, msg_id)
    except:
        pass

# ========== OWNER MANAGEMENT ==========
@bot.message_handler(commands=['myid'])
def my_id(msg):
    bot.reply_to(msg, f'👑 **Your ID:** `{msg.from_user.id}`', parse_mode='Markdown')

@bot.message_handler(commands=['addowner'])
def add_owner(msg):
    if msg.from_user.id != MASTER_OWNER:
        bot.reply_to(msg, '❌ Sirf MASTER owner add kar sakta hai!')
        return
    try:
        parts = msg.text.split()
        if len(parts) < 2:
            bot.reply_to(msg, '❌ Usage: /addowner ID')
            return
        new_id = int(parts[1])
        if new_id in OWNERS:
            bot.reply_to(msg, f'❌ {new_id} already owner!')
            return
        OWNERS.append(new_id)
        save_owners(OWNERS)
        bot.reply_to(msg, f'✅ Owner added! Total: {len(OWNERS)}', parse_mode='Markdown')
    except:
        bot.reply_to(msg, '❌ Invalid ID!')

@bot.message_handler(commands=['removeowner'])
def remove_owner(msg):
    if msg.from_user.id != MASTER_OWNER:
        bot.reply_to(msg, '❌ Sirf MASTER owner remove kar sakta hai!')
        return
    try:
        parts = msg.text.split()
        if len(parts) < 2:
            bot.reply_to(msg, '❌ Usage: /removeowner ID')
            return
        rem_id = int(parts[1])
        if rem_id == MASTER_OWNER:
            bot.reply_to(msg, '❌ Cannot remove MASTER owner!')
            return
        if rem_id not in OWNERS:
            bot.reply_to(msg, f'❌ {rem_id} not an owner!')
            return
        OWNERS.remove(rem_id)
        save_owners(OWNERS)
        bot.reply_to(msg, f'🗑️ Owner removed! Total: {len(OWNERS)}', parse_mode='Markdown')
    except:
        bot.reply_to(msg, '❌ Invalid ID!')

@bot.message_handler(commands=['owners'])
def list_owners(msg):
    if not is_owner(msg.from_user.id):
        bot.reply_to(msg, '❌ Only owners can view!')
        return
    lst = '\n'.join([f'👑 {i+1}. `{oid}` {"(MASTER)" if oid == MASTER_OWNER else ""}' for i, oid in enumerate(OWNERS)])
    bot.reply_to(msg, f'**OWNERS ({len(OWNERS)})**\n\n{lst}', parse_mode='Markdown')

# ========== FILE MANAGEMENT ==========
@bot.message_handler(commands=['upload'])
def upload_cmd(msg):
    if not is_owner(msg.from_user.id):
        bot.reply_to(msg, '❌ Sirf owner!')
        return
    bot.reply_to(msg, '📤 Ab file bhejo')

@bot.message_handler(content_types=['document'])
def handle_doc(msg):
    if not is_owner(msg.from_user.id):
        bot.reply_to(msg, '❌ Sirf owner!')
        return
    global FILE_ID
    FILE_ID = msg.document.file_id
    save_file(FILE_ID)
    bot.reply_to(msg, f'✅ **FILE SET!**\n📄 `{msg.document.file_name}`\n🔗 `https://t.me/{(bot.get_me()).username}?start={SECRET}`', parse_mode='Markdown')

@bot.message_handler(commands=['showfile'])
def show_cmd(msg):
    if not is_owner(msg.from_user.id):
        return
    if FILE_ID:
        bot.send_document(msg.chat.id, FILE_ID, caption='📁 Current file')
    else:
        bot.reply_to(msg, '❌ No file set!')

@bot.message_handler(commands=['removefile'])
def remove_cmd(msg):
    if not is_owner(msg.from_user.id):
        return
    global FILE_ID
    FILE_ID = None
    save_file(None)
    bot.reply_to(msg, '🗑️ File removed!')

@bot.message_handler(commands=['status'])
def status_cmd(msg):
    if not is_owner(msg.from_user.id):
        return
    bot.reply_to(msg, f'📊 **STATUS**\n📁 File: `{"✅" if FILE_ID else "❌"}`\n👑 Owners: `{len(OWNERS)}`\n⏰ Auto-delete: 1 Hour', parse_mode='Markdown')

# ========== USER COMMANDS ==========
@bot.message_handler(commands=['start'])
def start_cmd(msg):
    if not FILE_ID:
        bot.reply_to(msg, '❌ No file set! Contact owner.')
        return
    p = msg.text.split()
    if len(p) > 1 and p[1] == SECRET:
        bot.send_message(msg.chat.id, '⚠️ **1 GHANTA ME DELETE!** Download kar le!', parse_mode='Markdown')
        f = bot.send_document(msg.chat.id, FILE_ID, caption='🔓 Ye le teri file!')
        threading.Thread(target=delete_later, args=(msg.chat.id, f.message_id, 3600)).start()
    elif len(p) > 1:
        bot.reply_to(msg, '❌ GALAT LINK!')
    else:
        bot.reply_to(msg, '🤡 Channel ke link pe click kar!')

@bot.message_handler(commands=['ping'])
def ping(msg):
    bot.reply_to(msg, '🏓 OGGY ALIVE!')

print('='*50)
print('🔥 OGGY FILE BOT - FINAL')
print(f'👑 MASTER: {MASTER_OWNER}')
print(f'📋 OWNERS: {len(OWNERS)}')
print(f'📁 FILE: {FILE_ID is not None}')
print('='*50)
bot.infinity_polling()
EOF
