name: OGGY FILE BOT

on:
  schedule:
    - cron: "0 */6 * * *"
    - cron: "10 */6 * * *"
    - cron: "20 */6 * * *"
    - cron: "30 */6 * * *"
    - cron: "40 */6 * * *"
    - cron: "50 */6 * * *"
  workflow_dispatch:
  push:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: pip install pytelegrambotapi
      
      - name: Run Bot
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          python3 << 'EOF'
import telebot
import threading
import time
import os
import json

TOKEN = os.environ['TOKEN']
MASTER_OWNER = int(os.environ.get('OWNER_ID', 0))

bot = telebot.TeleBot(TOKEN)
SECRET = 'give_my_file'
DATA_FILE = 'file_data.json'
OWNERS_FILE = 'owners.json'

def load_owners():
    try:
        with open(OWNERS_FILE, 'r') as f:
            return json.load(f).get('owners', [MASTER_OWNER])
    except:
        return [MASTER_OWNER]

def save_owners(owners):
    with open(OWNERS_FILE, 'w') as f:
        json.dump({'owners': owners}, f)

def load_file():
    try:
        with open(DATA_FILE, 'r') as f:
            return json.load(f).get('file_id')
    except:
        return None

def save_file(file_id):
    with open(DATA_FILE, 'w') as f:
        json.dump({'file_id': file_id}, f)

OWNERS = load_owners()
FILE_ID = load_file()

def is_owner(user_id):
    return user_id in OWNERS

def delete_later(chat_id, msg_id, sec):
    time.sleep(sec)
    try:
        bot.delete_message(chat_id, msg_id)
    except:
        pass

@bot.message_handler(commands=['myid'])
def my_id(msg):
    bot.reply_to(msg, f'Your ID: {msg.from_user.id}')

@bot.message_handler(commands=['addowner'])
def add_owner(msg):
    if msg.from_user.id != MASTER_OWNER:
        bot.reply_to(msg, 'Only master owner can add owners!')
        return
    try:
        parts = msg.text.split()
        if len(parts) < 2:
            bot.reply_to(msg, 'Usage: /addowner ID')
            return
        new_id = int(parts[1])
        if new_id in OWNERS:
            bot.reply_to(msg, f'{new_id} is already an owner!')
            return
        OWNERS.append(new_id)
        save_owners(OWNERS)
        bot.reply_to(msg, f'Owner added! Total owners: {len(OWNERS)}')
    except:
        bot.reply_to(msg, 'Invalid ID!')

@bot.message_handler(commands=['removeowner'])
def remove_owner(msg):
    if msg.from_user.id != MASTER_OWNER:
        bot.reply_to(msg, 'Only master owner can remove owners!')
        return
    try:
        parts = msg.text.split()
        if len(parts) < 2:
            bot.reply_to(msg, 'Usage: /removeowner ID')
            return
        rem_id = int(parts[1])
        if rem_id == MASTER_OWNER:
            bot.reply_to(msg, 'Cannot remove master owner!')
            return
        if rem_id not in OWNERS:
            bot.reply_to(msg, f'{rem_id} is not an owner!')
            return
        OWNERS.remove(rem_id)
        save_owners(OWNERS)
        bot.reply_to(msg, f'Owner removed! Total owners: {len(OWNERS)}')
    except:
        bot.reply_to(msg, 'Invalid ID!')

@bot.message_handler(commands=['owners'])
def list_owners(msg):
    if not is_owner(msg.from_user.id):
        bot.reply_to(msg, 'Only owners can view!')
        return
    lst = ''
    for i, oid in enumerate(OWNERS):
        lst += f'{i+1}. {oid}'
        if oid == MASTER_OWNER:
            lst += ' (MASTER)'
        lst += '\n'
    bot.reply_to(msg, f'OWNERS ({len(OWNERS)}):\n{lst}')

@bot.message_handler(commands=['upload'])
def upload_cmd(msg):
    if not is_owner(msg.from_user.id):
        bot.reply_to(msg, 'Only owners can upload!')
        return
    bot.reply_to(msg, 'Send me the file to set')

@bot.message_handler(content_types=['document'])
def handle_doc(msg):
    if not is_owner(msg.from_user.id):
        bot.reply_to(msg, 'Only owners can upload!')
        return
    global FILE_ID
    FILE_ID = msg.document.file_id
    save_file(FILE_ID)
    botname = bot.get_me().username
    bot.reply_to(msg, f'FILE SET!\nFile: {msg.document.file_name}\nLink: https://t.me/{botname}?start={SECRET}')

@bot.message_handler(commands=['showfile'])
def show_cmd(msg):
    if not is_owner(msg.from_user.id):
        return
    if FILE_ID:
        bot.send_document(msg.chat.id, FILE_ID, caption='Current file')
    else:
        bot.reply_to(msg, 'No file set!')

@bot.message_handler(commands=['removefile'])
def remove_cmd(msg):
    if not is_owner(msg.from_user.id):
        return
    global FILE_ID
    FILE_ID = None
    save_file(None)
    bot.reply_to(msg, 'File removed!')

@bot.message_handler(commands=['status'])
def status_cmd(msg):
    if not is_owner(msg.from_user.id):
        return
    bot.reply_to(msg, f'STATUS\nFile: {"YES" if FILE_ID else "NO"}\nOwners: {len(OWNERS)}\nAuto-delete: 1 Hour')

@bot.message_handler(commands=['start'])
def start_cmd(msg):
    if not FILE_ID:
        bot.reply_to(msg, 'No file set! Contact owner.')
        return
    parts = msg.text.split()
    if len(parts) > 1 and parts[1] == SECRET:
        bot.send_message(msg.chat.id, 'WARNING! This file will be deleted in 1 hour! Download now.')
        f = bot.send_document(msg.chat.id, FILE_ID, caption='Here is your file!')
        threading.Thread(target=delete_later, args=(msg.chat.id, f.message_id, 3600)).start()
    elif len(parts) > 1:
        bot.reply_to(msg, 'Wrong link! Use channel link.')
    else:
        bot.reply_to(msg, 'Click the link from channel! /start wont work.')

@bot.message_handler(commands=['ping'])
def ping(msg):
    bot.reply_to(msg, 'Pong! Bot is alive')

print('OGGY BOT ACTIVE!')
print(f'Master Owner: {MASTER_OWNER}')
print(f'Total Owners: {len(OWNERS)}')
print(f'File Set: {FILE_ID is not None}')
bot.infinity_polling()
EOF
